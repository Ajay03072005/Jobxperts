<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Applications Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/AppManagement.css" />
  </head>
  <body>
    <div class="app-bg-gradient"></div>
    <header class="app-header">
      <div class="container">
        <h1>Applications Management</h1>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-header">
          <h2>Student Applications</h2>
          <div class="actions-inline">
            <input id="searchInput" class="input" type="search" placeholder="Search by name or program" />
            <select id="statusFilter" class="select">
              <option value="all">All statuses</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="table" id="applicationsTable">
            <thead>
              <tr class="table-header">
                <th>Student</th>
                <th>Program</th>
                <th>Submitted</th>
                <th>Status</th>
                <th class="col-actions">Actions</th>
              </tr>
            </thead>
            <tbody id="applicationsTbody">
              <!-- Rows rendered by JS -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>

    <script src="..assets/js/AppManagement.js"></script>
  </body>
  </html>
