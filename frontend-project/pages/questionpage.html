<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Bank</title>
  <style>
    body {
      font-family: 'Cormorant Garamond', serif;
      background: #312f2f34;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    form, #questionList {
      margin-top: 20px;
    }

    input, select, textarea {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      font-size: 1em;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    #mcqOptions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px;
      cursor: pointer;
      font-size: 1em;
      border-radius: 5px;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #45a049;
    }

    .question-card {
      background: #eaeaea;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      position: relative;
    }

    .question-card button {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #e74c3c;
      padding: 6px 10px;
      font-size: 0.9em;
    }

    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2em;
      }

      .container {
        padding: 15px;
      }

      input, select, textarea, button {
        font-size: 0.95em;
        padding: 8px;
      }

      .question-card {
        font-size: 0.95em;
      }

      #mcqOptions {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.6em;
      }

      button {
        width: 100%;
      }

      .question-card button {
        top: auto;
        bottom: 10px;
        right: 10px;
      }

      #mcqOptions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Question Bank</h1>

    <form id="questionForm">
      <select id="type">
        <option value="MCQ">MCQ</option>
        <option value="TrueFalse">True/False</option>
      </select>

      <input type="text" id="question" placeholder="Enter question" required />

      <div id="mcqOptions">
        <input type="text" placeholder="Option A" class="option" />
        <input type="text" placeholder="Option B" class="option" />
        <input type="text" placeholder="Option C" class="option" />
        <input type="text" placeholder="Option D" class="option" />
      </div>

      <input type="text" id="answer" placeholder="Correct answer" required />
      <input type="text" id="tags" placeholder="Tags (comma-separated)" />
      <select id="difficulty">
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>
      <textarea id="explanation" placeholder="Explanation (optional)"></textarea>

      <button type="submit">Add Question</button>
    </form>

    <input type="file" id="csvUpload" accept=".csv" />
    <div id="questionList"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
